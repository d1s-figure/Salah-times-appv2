<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prayer Times (Karachi Method)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Main Container -->
    <div class="max-w-md mx-auto w-full px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-400">Prayer Times</h1>
            <p id="location-display" class="text-gray-400 mt-2">Fetching your location...</p>
            <p id="date-display" class="text-sm text-emerald-500 font-semibold mt-1"></p>
            <span class="inline-block mt-3 bg-slate-800 text-xs text-emerald-400 px-3 py-1 rounded-full border border-slate-700">
                Karachi (Hanafi) Method
            </span>
        </header>

        <!-- Prayer Times Cards -->
        <div id="prayer-list" class="space-y-3">
            <!-- Loading State -->
            <div class="text-center text-gray-400 py-12">Loading daily timings...</div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-gray-500">
        Powered by AlAdhan API | University of Islamic Sciences, Karachi
    </footer>

    <script>
        // 1. Get user's current location automatically
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(fetchPrayerTimes, handleError);
        } else {
            alert("Geolocation is not supported. Defaulting to Karachi coordinates.");
            fetchPrayerTimes({ coords: { latitude: 24.8607, longitude: 67.0011 } });
        }

        function handleError(error) {
            // Default to Karachi, Pakistan coordinates if location access is denied
            console.log("Location denied, defaulting to Karachi.");
            fetchPrayerTimes({ coords: { latitude: 24.8607, longitude: 67.0011 } });
            document.getElementById('location-display').innerText = "Karachi, Pakistan (Default)";
        }

        // 2. Fetch data dynamically from the external API using Method 1 & School 1
        async function fetchPrayerTimes(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            if(document.getElementById('location-display').innerText === "Fetching your location...") {
                document.getElementById('location-display').innerText = `Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`;
            }

            try {
                // method=1 specifies University of Islamic Sciences, Karachi
                // school=1 specifies Hanafi Juristic school for Asr calculation
                const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=1&school=1`);
                const result = await response.json();
                
                if (result.code === 200) {
                    displayData(result.data);
                } else {
                    throw new Error("API error");
                }
            } catch (error) {
                document.getElementById('prayer-list').innerHTML = `<div class="text-center text-red-400">Failed to load data. Please refresh.</div>`;
            }
        }

        // 3. Render the data cleanly on the page
        function displayData(data) {
            const timings = data.timings;
            const date = data.date;

            // Display current Gregorian and Hijri date
            document.getElementById('date-display').innerText = `${date.readable} • ${date.hijri.day} ${date.hijri.month.en} ${date.hijri.year} AH`;

            // Core prayers to display
            const corePrayers = [
                { name: 'Fajr', time: timings.Fajr },
                { name: 'Sunrise', time: timings.Sunrise },
                { name: 'Dhuhr', time: timings.Dhuhr },
                { name: 'Asr', time: timings.Asr },
                { name: 'Maghrib', time: timings.Maghrib },
                { name: 'Isha', time: timings.Isha }
            ];

            const listContainer = document.getElementById('prayer-list');
            listContainer.innerHTML = ''; // Clear loading text

            corePrayers.forEach(prayer => {
                const card = document.createElement('div');
                card.className = "flex justify-between items-center bg-slate-800 p-4 rounded-xl shadow-md border border-slate-700/50 hover:border-emerald-500/50 transition-all";
                
                // Convert 24h format to 12h format
                const time12 = convertTo12Hour(prayer.time);

                card.innerHTML = `
                    <span class="font-medium text-lg text-gray-200">${prayer.name}</span>
                    <span class="text-xl font-bold text-emerald-400">${time12}</span>
                `;
                listContainer.appendChild(card);
            });
        }

        function convertTo12Hour(timeString) {
            const [hours, minutes] = timeString.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const formattedHour = hour % 12 || 12;
            return `${formattedHour}:${minutes} ${ampm}`;
        }
    </script>
</body>
</html>
